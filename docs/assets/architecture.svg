<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="980" viewBox="0 0 720 980" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Consolas, monospace">

  <!-- ── Background ── -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="boxBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
    <linearGradient id="boxGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#238636"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="boxPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6e40c9"/>
      <stop offset="100%" stop-color="#8957e5"/>
    </linearGradient>
    <linearGradient id="boxOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#9e6a03"/>
      <stop offset="100%" stop-color="#d29922"/>
    </linearGradient>
    <linearGradient id="boxRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#b62324"/>
      <stop offset="100%" stop-color="#da3633"/>
    </linearGradient>
    <linearGradient id="boxTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6e7681"/>
    </marker>
  </defs>

  <rect width="720" height="980" fill="url(#bgGrad)" rx="16"/>

  <!-- ── Title ── -->
  <text x="360" y="46" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700" letter-spacing="1">
    MiniFlow Compiler Pipeline
  </text>
  <text x="360" y="68" text-anchor="middle" fill="#8b949e" font-size="13">
    Tree-Walking Interpreter Architecture
  </text>
  <line x1="60" y1="80" x2="660" y2="80" stroke="#30363d" stroke-width="1"/>

  <!-- ════════════════ STAGE 1 — SOURCE ════════════════ -->
  <!-- Box -->
  <rect x="210" y="100" width="300" height="72" rx="10" fill="#161b22" stroke="#388bfd" stroke-width="2" filter="url(#shadow)"/>
  <rect x="210" y="100" width="300" height="8" rx="10" fill="url(#boxBlue)"/>
  <text x="360" y="128" text-anchor="middle" fill="#79c0ff" font-size="15" font-weight="700">📄 Source Code</text>
  <text x="360" y="148" text-anchor="middle" fill="#8b949e" font-size="12">program.mf  (UTF-8 text)</text>
  <text x="360" y="165" text-anchor="middle" fill="#6e7681" font-size="11">Statements · Expressions · Indentation</text>

  <!-- Arrow 1 -->
  <line x1="360" y1="172" x2="360" y2="204" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="310" y="183" width="100" height="18" rx="4" fill="#161b22"/>
  <text x="360" y="195" text-anchor="middle" fill="#6e7681" font-size="10" font-style="italic">character stream</text>

  <!-- ════════════════ STAGE 2 — LEXER ════════════════ -->
  <rect x="160" y="204" width="400" height="90" rx="10" fill="#161b22" stroke="#2ea043" stroke-width="2" filter="url(#shadow)"/>
  <rect x="160" y="204" width="400" height="8" rx="10" fill="url(#boxGreen)"/>
  <text x="360" y="231" text-anchor="middle" fill="#56d364" font-size="15" font-weight="700">⚡ Lexer  ·  src/Lexer.hs</text>
  <text x="230" y="252" text-anchor="middle" fill="#8b949e" font-size="11">• Regex-free hand-written</text>
  <text x="390" y="252" text-anchor="middle" fill="#8b949e" font-size="11">• Indent/Dedent injection</text>
  <text x="230" y="268" text-anchor="middle" fill="#8b949e" font-size="11">• f-string interpolation</text>
  <text x="390" y="268" text-anchor="middle" fill="#8b949e" font-size="11">• Line continuation tracking</text>
  <text x="360" y="286" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">O(n) time  ·  O(n) space</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="294" x2="360" y2="326" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="290" y="305" width="140" height="18" rx="4" fill="#161b22"/>
  <text x="360" y="317" text-anchor="middle" fill="#6e7681" font-size="10" font-style="italic">token stream [TokenInfo]</text>

  <!-- ════════════════ STAGE 3 — PARSER ════════════════ -->
  <rect x="160" y="326" width="400" height="90" rx="10" fill="#161b22" stroke="#8957e5" stroke-width="2" filter="url(#shadow)"/>
  <rect x="160" y="326" width="400" height="8" rx="10" fill="url(#boxPurple)"/>
  <text x="360" y="353" text-anchor="middle" fill="#bc8cff" font-size="15" font-weight="700">🧩 Parser  ·  src/Parser.hs</text>
  <text x="230" y="374" text-anchor="middle" fill="#8b949e" font-size="11">• Recursive descent (LL1)</text>
  <text x="390" y="374" text-anchor="middle" fill="#8b949e" font-size="11">• Pratt operator precedence</text>
  <text x="230" y="390" text-anchor="middle" fill="#8b949e" font-size="11">• Tuple destructuring</text>
  <text x="390" y="390" text-anchor="middle" fill="#8b949e" font-size="11">• List / dict comprehensions</text>
  <text x="360" y="408" text-anchor="middle" fill="#8957e5" font-size="11" font-weight="600">O(n) time  ·  O(n) space</text>

  <!-- Arrow 3 -->
  <line x1="360" y1="416" x2="360" y2="448" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="280" y="427" width="160" height="18" rx="4" fill="#161b22"/>
  <text x="360" y="439" text-anchor="middle" fill="#6e7681" font-size="10" font-style="italic">Abstract Syntax Tree (AST)</text>

  <!-- ════════════════ STAGE 4 — AST ════════════════ -->
  <rect x="210" y="448" width="300" height="72" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2" filter="url(#shadow)"/>
  <rect x="210" y="448" width="300" height="8" rx="10" fill="url(#boxOrange)"/>
  <text x="360" y="476" text-anchor="middle" fill="#e3b341" font-size="15" font-weight="700">🌳 AST  ·  src/Types.hs</text>
  <text x="360" y="496" text-anchor="middle" fill="#8b949e" font-size="12">Stmt · Expr · Pattern · Value</text>
  <text x="360" y="513" text-anchor="middle" fill="#6e7681" font-size="11">Typed algebraic data types (ADT)</text>

  <!-- Arrow 4 -->
  <line x1="360" y1="520" x2="360" y2="552" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="290" y="531" width="140" height="18" rx="4" fill="#161b22"/>
  <text x="360" y="543" text-anchor="middle" fill="#6e7681" font-size="10" font-style="italic">recurse &amp; evaluate</text>

  <!-- ════════════════ STAGE 5 — EVALUATOR ════════════════ -->
  <rect x="110" y="552" width="500" height="100" rx="10" fill="#161b22" stroke="#da3633" stroke-width="2" filter="url(#shadow)"/>
  <rect x="110" y="552" width="500" height="8" rx="10" fill="url(#boxRed)"/>
  <text x="360" y="579" text-anchor="middle" fill="#ff7b72" font-size="15" font-weight="700">🔥 Evaluator  ·  src/Evaluator.hs</text>
  <text x="220" y="600" text-anchor="middle" fill="#8b949e" font-size="11">• Tree-walking interpreter</text>
  <text x="430" y="600" text-anchor="middle" fill="#8b949e" font-size="11">• Closures &amp; lexical scope</text>
  <text x="220" y="616" text-anchor="middle" fill="#8b949e" font-size="11">• Lazy evaluation (IORef)</text>
  <text x="430" y="616" text-anchor="middle" fill="#8b949e" font-size="11">• Tail-call recursion</text>
  <text x="220" y="632" text-anchor="middle" fill="#8b949e" font-size="11">• Pipe |&gt; / Compose . / Bind &gt;&gt;</text>
  <text x="430" y="632" text-anchor="middle" fill="#8b949e" font-size="11">• Error handling (try/except)</text>
  <text x="360" y="645" text-anchor="middle" fill="#da3633" font-size="11" font-weight="600">O(n·d) avg  ·  O(d) stack depth</text>

  <!-- ── Sub-system arrows from Evaluator ── -->
  <!-- Left arrow to Environment -->
  <line x1="240" y1="652" x2="170" y2="720" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <!-- Center arrow to PatternMatch -->
  <line x1="360" y1="652" x2="360" y2="720" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <!-- Right arrow to Builtins -->
  <line x1="480" y1="652" x2="550" y2="720" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>

  <!-- ════════ Sub-system row ════════ -->
  <!-- Environment -->
  <rect x="60" y="720" width="180" height="80" rx="8" fill="#161b22" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="720" width="180" height="6" rx="8" fill="url(#boxTeal)"/>
  <text x="150" y="742" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">🗂 Environment</text>
  <text x="150" y="757" text-anchor="middle" fill="#8b949e" font-size="10">src/Environment.hs</text>
  <text x="150" y="771" text-anchor="middle" fill="#6e7681" font-size="9">Scope chain · Closures</text>
  <text x="150" y="784" text-anchor="middle" fill="#6e7681" font-size="9">defineVar · lookupVar</text>
  <text x="150" y="797" text-anchor="middle" fill="#0ea5e9" font-size="9" font-weight="600">O(d) lookup</text>

  <!-- PatternMatch -->
  <rect x="270" y="720" width="180" height="80" rx="8" fill="#161b22" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="270" y="720" width="180" height="6" rx="8" fill="url(#boxTeal)"/>
  <text x="360" y="742" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">🔍 PatternMatch</text>
  <text x="360" y="757" text-anchor="middle" fill="#8b949e" font-size="10">src/PatternMatch.hs</text>
  <text x="360" y="771" text-anchor="middle" fill="#6e7681" font-size="9">Literal · Ctor · Guard</text>
  <text x="360" y="784" text-anchor="middle" fill="#6e7681" font-size="9">Tuple · List · Wildcard</text>
  <text x="360" y="797" text-anchor="middle" fill="#0ea5e9" font-size="9" font-weight="600">O(arms × depth)</text>

  <!-- Builtins -->
  <rect x="480" y="720" width="180" height="80" rx="8" fill="#161b22" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="480" y="720" width="180" height="6" rx="8" fill="url(#boxTeal)"/>
  <text x="570" y="742" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">📦 Builtins</text>
  <text x="570" y="757" text-anchor="middle" fill="#8b949e" font-size="10">Python.hs · Haskell.hs</text>
  <text x="570" y="771" text-anchor="middle" fill="#6e7681" font-size="9">60+ Python  functions</text>
  <text x="570" y="784" text-anchor="middle" fill="#6e7681" font-size="9">90+ Haskell functions</text>
  <text x="570" y="797" text-anchor="middle" fill="#0ea5e9" font-size="9" font-weight="600">150+ total builtins</text>

  <!-- ── Converge arrows to Output ── -->
  <line x1="150" y1="800" x2="260" y2="866" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="800" x2="360" y2="866" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="800" x2="460" y2="866" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ════════════════ OUTPUT ════════════════ -->
  <rect x="210" y="866" width="300" height="72" rx="10" fill="#161b22" stroke="#388bfd" stroke-width="2" filter="url(#shadow)"/>
  <rect x="210" y="866" width="300" height="8" rx="10" fill="url(#boxBlue)"/>
  <text x="360" y="893" text-anchor="middle" fill="#79c0ff" font-size="15" font-weight="700">🖥 Output  /  REPL</text>
  <text x="360" y="912" text-anchor="middle" fill="#8b949e" font-size="12">src/Pretty.hs  ·  src/REPL.hs</text>
  <text x="360" y="929" text-anchor="middle" fill="#6e7681" font-size="11">Formatted values · Error messages · REPL</text>

  <!-- ── Footer ── -->
  <line x1="60" y1="952" x2="660" y2="952" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="968" text-anchor="middle" fill="#484f58" font-size="11">MiniFlow v1.0  ·  7,982 lines of Haskell  ·  23CSE212 PFPL</text>

</svg>
